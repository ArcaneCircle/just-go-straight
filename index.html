<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8"/>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <style>
      body{
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        background-color:black;
        background-image:
          radial-gradient(circle at 100% 150%, black 24%, #111 25%, #111 28%, black 29%, black 36%, #111 36%, #111 40%, transparent 40%, transparent),

          radial-gradient(circle at 0    50%, #111 5%, black 6%, black 15%, #111 16%, #111 20%, black 21%, black 30%, #111 31%, #111 35%, black 36%, black 45%, #111 46%, #111 49%, transparent 50%, transparent);
        background-size:100px 50px;
      }
      canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        aspect-ratio: 640 / 480;
      }

    <script src="webxdc.js"></script>
  </head>
